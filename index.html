<!doctype html>
<html lang="en" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Ermine — a refined client for stoat.chat." />
    <meta name="theme-color" content="#1e1f22" />
    <title>Ermine — stoat.chat</title>
    <link rel="icon" type="image/png" sizes="192x192" href="/assets/android-chrome-192x192.png" />
    <link rel="shortcut icon" href="/assets/android-chrome-192x192.png" />
    <!-- PNG icons for home screen / PWA (served from public/assets/) -->
    <link rel="apple-touch-icon" sizes="192x192" href="/assets/android-chrome-192x192.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
            keyframes: {
              ermineModalIn: {
                from: { opacity: '0', transform: 'translateY(6px) scale(0.98)' },
                to:   { opacity: '1', transform: 'translateY(0) scale(1)' },
              },
            },
            animation: {
              ermineModalIn: 'ermineModalIn 140ms ease-out',
            },
          },
        },
      };
    </script>
    <style>
      :root { color-scheme: dark; }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #313338;
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
      }

      @keyframes ermineModalIn {
        from { opacity: 0; transform: translateY(6px) scale(0.98); }
        to   { opacity: 1; transform: translateY(0) scale(1); }
      }

      #root { min-height: 100vh; }

      /* ── Thin scrollbars ── */
      ::-webkit-scrollbar             { width: 8px; height: 8px; }
      ::-webkit-scrollbar-track       { background: #2b2d31; border-radius: 4px; }
      ::-webkit-scrollbar-thumb       { background: #1a1b1e; border-radius: 4px; border: 2px solid #2b2d31; }
      ::-webkit-scrollbar-thumb:hover { background: #111214; }
      *                               { scrollbar-width: thin; scrollbar-color: #1a1b1e #2b2d31; }

      /* ── Auto-growing textarea ── */
      .composer-textarea {
        field-sizing: content;
        max-height: 200px;
        overflow-y: auto;
        line-height: 1.45;
      }

      /* ── Reaction tap spring ── */
      .reaction-btn { transition: transform 70ms ease, background 70ms ease; }
      .reaction-btn:active { transform: scale(0.85); }

      /* ── Typing dot bounce ── */
      @keyframes typingBounce {
        0%, 60%, 100% { transform: translateY(0); }
        30%            { transform: translateY(-4px); }
      }
      .typing-dot { animation: typingBounce 1.2s ease-in-out infinite; }
      .typing-dot:nth-child(2) { animation-delay: 0.15s; }
      .typing-dot:nth-child(3) { animation-delay: 0.30s; }

      /* ── Unread channel pulse ── */
      .unread-dot { animation: unreadPulse 2s ease-in-out infinite; }
      @keyframes unreadPulse {
        0%, 100% { opacity: 1; }
        50%       { opacity: 0.5; }
      }

      /* ── Message highlight flash ── */
      @keyframes msgHighlight {
        0%   { background: rgba(88,101,242,0.25); }
        100% { background: transparent; }
      }
      .msg-highlight { animation: msgHighlight 1.2s ease-out forwards; }
      /* ── Spoiler ── */
      .spoiler { background: #202225; border-radius: 3px; cursor: pointer; }
      .spoiler.revealed { background: #383a40; cursor: default; }
      .spoiler:not(.revealed) * { color: transparent !important; user-select: none; }

      /* ── Server pill indicator (Discord signature) ── */
      .srv-pill {
        position: absolute; left: 0; top: 50%; transform: translateY(-50%);
        width: 4px; background: #fff; border-radius: 0 4px 4px 0;
        transition: height 150ms ease;
      }
      .srv-wrap:hover .srv-pill { height: 20px; }
      .srv-wrap.active .srv-pill { height: 40px; }
      .srv-wrap .srv-icon {
        border-radius: 50%;
        transition: border-radius 150ms ease, background 150ms ease;
      }
      .srv-wrap:hover .srv-icon,
      .srv-wrap.active .srv-icon { border-radius: 16px; }

      /* ── Channel item Discord-style ── */
      .ch-item { color: #80848e; border-radius: 4px; }
      .ch-item:hover { color: #dcddde; background: #35373c; }
      .ch-item.active { color: #f2f3f5; background: #404249; }
      .ch-item.unread { color: #f2f3f5; font-weight: 600; }
      .ch-item.unread::before {
        content: ''; position: absolute; left: -8px; top: 50%;
        transform: translateY(-50%); width: 8px; height: 8px;
        border-radius: 50%; background: #f2f3f5;
      }

      /* ── New messages divider ── */
      .new-messages-divider {
        display: flex; align-items: center; gap: 8px;
        margin: 8px 16px 4px; user-select: none;
      }
      .new-messages-divider::before,
      .new-messages-divider::after {
        content: ''; flex: 1; height: 1px; background: #ed4245;
      }

    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
