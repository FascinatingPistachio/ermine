<!doctype html>
<html lang="en" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Ermine — a refined client for stoat.chat." />
    <meta name="theme-color" content="#0F1115" />
    <title>Ermine</title>
    <!-- Favicon: inline SVG so it always loads without needing file resolution -->
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%230F1115'/%3E%3Cpath d='M18 16h28v8H28v8h14v8H28v8h18v8H18V16z' fill='%23E6EDF3'/%3E%3C/svg%3E" />
    <!-- PNG icons for home screen / PWA (served from public/assets/) -->
    <link rel="apple-touch-icon" sizes="192x192" href="/assets/android-chrome-192x192.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
            keyframes: {
              ermineModalIn: {
                from: { opacity: '0', transform: 'translateY(6px) scale(0.98)' },
                to:   { opacity: '1', transform: 'translateY(0) scale(1)' },
              },
            },
            animation: {
              ermineModalIn: 'ermineModalIn 140ms ease-out',
            },
          },
        },
      };
    </script>
    <style>
      :root { color-scheme: dark; }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #0f1115;
      }

      @keyframes ermineModalIn {
        from { opacity: 0; transform: translateY(6px) scale(0.98); }
        to   { opacity: 1; transform: translateY(0) scale(1); }
      }

      #root { min-height: 100vh; }

      /* ── Thin scrollbars ── */
      ::-webkit-scrollbar             { width: 5px; height: 5px; }
      ::-webkit-scrollbar-track       { background: transparent; }
      ::-webkit-scrollbar-thumb       { background: #3f4249; border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: #5c606a; }
      *                               { scrollbar-width: thin; scrollbar-color: #3f4249 transparent; }

      /* ── Auto-growing textarea ── */
      .composer-textarea {
        field-sizing: content;
        max-height: 200px;
        overflow-y: auto;
        line-height: 1.45;
      }

      /* ── Reaction tap spring ── */
      .reaction-btn { transition: transform 70ms ease, background 70ms ease; }
      .reaction-btn:active { transform: scale(0.85); }

      /* ── Typing dot bounce ── */
      @keyframes typingBounce {
        0%, 60%, 100% { transform: translateY(0); }
        30%            { transform: translateY(-4px); }
      }
      .typing-dot { animation: typingBounce 1.2s ease-in-out infinite; }
      .typing-dot:nth-child(2) { animation-delay: 0.15s; }
      .typing-dot:nth-child(3) { animation-delay: 0.30s; }

      /* ── Unread channel pulse ── */
      .unread-dot { animation: unreadPulse 2s ease-in-out infinite; }
      @keyframes unreadPulse {
        0%, 100% { opacity: 1; }
        50%       { opacity: 0.5; }
      }

      /* ── Message highlight flash ── */
      @keyframes msgHighlight {
        0%   { background: rgba(88,101,242,0.25); }
        100% { background: transparent; }
      }
      .msg-highlight { animation: msgHighlight 1.2s ease-out forwards; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
